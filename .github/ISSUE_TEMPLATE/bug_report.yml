name: Bug report
description: Something isn't working in the framework
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (nix-darwin)
        - Linux
        - WSL2
    validations:
      required: true

  - type: input
    id: profile
    attributes:
      label: Profile
      description: Which profile were you applying? (e.g. `personal`, `work-darwin-aarch64`)
      placeholder: personal
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: The exact command you ran
      render: sh
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Full error output, including any Nix trace
      render: text
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (Nix version, OS version, recent changes)
